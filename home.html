<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>

    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- css connect -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50">

    <!-- Header Section-->
    <section class="flex justify-center bg-white  ">
        <div class="bg-white w-full max-w-350 p-4 flex justify-between">

            <div class="flex items-center">
                <img src="assets/github-logo.png" class="mr-2 h-12 w-auto ">
                <h1 class=" font-semibold text-3xl mt-1">GitHub Issues Tracker</h1>
            </div>

            <div class="flex gap-2 ">
                
                <div class="flex ">
                    <i class="fa-solid fa-magnifying-glass relative left-8 mt-4 opacity-60"></i>
                    <input type="text" placeholder="Search"
                        class=" px-9 input-bordered p-2 h-10 rounded-sm border-gray-400 w-full" />
                </div>

                <div class="dropdown dropdown-end ">
                    <div> 
                        <button
                            class="bg-[#4A00FF] text-white w-25 py-2 rounded hover:bg-[#3300b5] font-semibold">+New
                            Issue
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Filter Section -->
    <section class="flex mt-16 mb-10 px-4 justify-center">

        <div class="flex bg-white border border-gray-200 rounded-xl p-4.5 shadow-sm w-full max-w-7xl gap-3 justify-between lg:justify-start md:justify-start">
            <button class="border border-gray-300 text-gray-500 w-30 py-2 font-semibold rounded">All</button>
            <button class="text-gray-500 w-30 py-2 font-semibold rounded border border-gray-300 ">Open</button>
            <button class="text-gray-500 w-30 py-2 font-semibold rounded border border-gray-300 ">Closed</button>
        </div>
    </section>

    <!-- 2nd header section  -->
    <section class="flex mt-16 px-4 justify-center">
        <div class="flex bg-white border border-gray-200 rounded-sm p-4.5 shadow-sm w-full max-w-7xl gap-3 justify-between lg:justify-start md:justify-start">

            <div class="bg-purple-200 text-white rounded-full w-14 h-14 flex items-center justify-center shrink-0 mt-auto mb-2.5 md:mb-0 lg:mb-0">
                <img src="assets/Aperture.png">
            </div>


            <div class="">
                <h1 class="text-xl font-semibold">50 Issues</h1>
                <h1 class="text-gray-500">Track and manage your project issues</h1>
            </div>
            
            <!-- open and close icon -->
            <div class="flex flex-1 justify-end gap-6 mt-4 font-semibold">

                <div class="flex fgap-2 gap-2">
                    <span class="mt-1.5 w-3 h-3 bg-green-600 rounded-full"></span>
                    <span class="">Open</span>
                </div>

                <div class="flex fgap-2 gap-2">
                    <span class="mt-1.5 w-3 h-3 bg-purple-500 rounded-full"></span>
                    <span class="">Open</span>
                </div>
            </div>
        </div>


        
    </section>

    <section class="flex mb-10 px-4 justify-center ">
        <div class="flex bg-gray-100  border-gray-200 rounded-sm p-4.5 shadow-sm w-full max-w-7xl gap-3 justify-between lg:justify-start md:justify-start"> 

                

        </div>
    </section>

</body>
</html>
